version: '3.8'

services:
  web:
    container_name: ai-artiste-web-${USER_ID:-1}-${HTTP_PORT:-8000}
    build: .
    ports:
      - "${HTTP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/artist_venue.db
      - USER_ID=${USER_ID}
      - HTTP_PORT=${HTTP_PORT}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    name: ai-artiste-network-${USER_ID:-1}
